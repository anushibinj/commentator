services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:11434/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - OPENAI_MODEL=${OPENAI_MODEL:-llava}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-}

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080/api}
      - VITE_BASE_PATH=${VITE_BASE_PATH:-/}
    ports:
      - "3000:80"
    depends_on:
      - backend
